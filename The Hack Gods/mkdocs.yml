site_name: Opsec C
markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
extra_css:
  - stylesheets/styles.css
extra_javascript:
  - scripts/theme_changer.js
validation:
  omitted_files: ignore
  absolute_links: ignore
  unrecognized_links: ignore
  not_found: ignore
theme:
  name: material
  font:
    text: Courier New
  palette:
    scheme: custom
    primary: custom
    accent: custom
